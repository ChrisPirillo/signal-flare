name: Link Check

# Runs weekly on Monday at 12:00 UTC, plus on every PR that touches Markdown.
# Uses lychee to find dead URLs in Markdown files and surfaces them as a workflow summary.
# Manual trigger also available.

on:
  schedule:
    - cron: '0 12 * * 1'
  pull_request:
    paths:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    name: Check links in Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --- What we check ---
          #   - All Markdown files in the repo
          # --- What we exclude ---
          #   - example.com / example.org placeholders used in templates
          #   - localhost / 127.0.0.1
          #   - GitHub user pages we haven't created yet ([your-username] placeholder)
          args: >-
            --no-progress
            --max-concurrency 4
            --max-redirects 5
            --timeout 30
            --exclude-mail
            --exclude '^https?://(www\.)?example\.(com|org)'
            --exclude 'localhost'
            --exclude '127\.0\.0\.1'
            --exclude 'your-username'
            --exclude 'YOUR_USERNAME'
            --include-fragments
            './**/*.md'
          fail: false
          format: markdown
          output: ./lychee-report.md

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: ./lychee-report.md

      - name: Open issue when scheduled run finds broken links
        if: github.event_name == 'schedule' && steps.lychee.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Weekly link check found broken links'
          content-filepath: ./lychee-report.md
          labels: |
            freshness
            link-rot

      - name: Fail PR if broken links present
        if: github.event_name == 'pull_request' && steps.lychee.outputs.exit_code != '0'
        run: |
          echo '::error::lychee found broken links — see the link-check-report artifact above for details.'
          exit 1
